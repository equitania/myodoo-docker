# Backup configuration for Odoo databases
# Date: 19.06.2026

# Default settings
defaults:
  retention_days: 14  # Retention period in days
  db_user: ownerp
  backup_path: /opt/backups
  temp_path: /tmp/odoo_backup  # Temporary path for backup operations
  compression:
    format: "7z"     # Compression format: 7z, zip, gzip, zstd (Note: encryption requires 7z format)
    level: 5         # Compression level (0-9, default: 5; for streaming this maps to the zstd level)
  # Streaming full backup (recommended for large filestores):
  # When true, full DB backups are piped straight into a single .tar.zst on the
  # target (filestore read in-place from the host volume) - no uncompressed
  # staging copy, so the backup medium only needs room for the SQL dump + the
  # compressed archive. Restore-compatible (.tar.zst). Falls back to staged
  # backup if zstd is missing, encryption is enabled, or the filestore host
  # path cannot be resolved. Can be overridden per database below.
  stream: false

# System-wide service backups (independent from databases)
services:
  nginx:
    enabled: true
    source_path: /etc/nginx
    backup_path: nginx
    retention_days: 14

  letsencrypt:
    enabled: true
    source_path: /etc/letsencrypt
    backup_path: letsencrypt
    retention_days: 14

  docker_builds:
    enabled: true
    source_path: $HOME/docker-builds
    backup_path: docker-builds
    retention_days: 14

# Database specific configurations
databases:
  - name: live_db
    sql_container: live-db
    data_container: live-odoo
    retention_days: 7
    only_sql_dump: false  # Optional: If true, only the SQL dump is backed up, filestore is skipped
    # stream: true        # Optional per-db override of defaults.stream (Design A, .tar.zst)
    fast_report:  # Optional fast-report configuration per database
      enabled: true
      path: /opt/fast-report/fr-live

  - name: test_db
    sql_container: test-db
    data_container: test-odoo
    retention_days: 7
    only_sql_dump: true  # Example: For this database, only back up the SQL dump, skip filestore
    fast_report:
      enabled: true
      path: /opt/fast-report/fr-test 

# Rsync configuration
rsync:
  enabled: true
  commands:
    #- "rsync -avz /opt/backups/docker/ user@remote-server:/backup/docker/"
    #- "rsync -avz /opt/backups/nginx/ user@remote-server:/backup/nginx/"
    #- "rsync -avz --delete /opt/backups/docker-builds/ user@remote-server:/backup/docker-builds/" 