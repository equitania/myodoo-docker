# Starship Prompt Configuration for ownERP Server Environment
# Version 1.0.0 | 28.01.2026
# https://starship.rs/config/

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# Inserts a blank line between shell prompts
add_newline = true

# Configure the format of the prompt
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$docker_context\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

# Right side prompt
right_format = """$time"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](bold yellow) "
disabled = false

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
format = "in [$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = "⚔️ "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "📦 "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "
style = "bold red"
format = '([$all_status$ahead_behind]($style))'

[docker_context]
symbol = "🐳 "
style = "blue bold"
format = "via [$symbol$context]($style) "
only_with_files = true
disabled = false

[python]
symbol = "🐍 "
style = "yellow bold"
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
python_binary = ["python", "python3"]
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "pyproject.toml", "requirements.txt", "setup.py", "tox.ini"]

[nodejs]
symbol = "⬢ "
style = "bold green"
format = "via [$symbol($version )]($style)"
detect_extensions = ["js", "mjs", "cjs", "ts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[rust]
symbol = "🦀 "
style = "bold red"
format = "via [$symbol($version )]($style)"

[golang]
symbol = "🐹 "
style = "bold cyan"
format = "via [$symbol($version )]($style)"

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"

[time]
disabled = false
format = '[\[ $time \]]($style) '
style = "bold white"
time_format = "%H:%M:%S"

[line_break]
disabled = false

# Memory usage - disabled by default (can be enabled for monitoring)
[memory_usage]
disabled = true
threshold = 75
symbol = "🧠 "
style = "bold dimmed white"
format = "via $symbol[${ram}( | ${swap})]($style) "

# Battery - disabled by default (not relevant for servers)
[battery]
disabled = true

# Package version - disabled to reduce clutter
[package]
disabled = true

# AWS/Cloud providers - disabled by default
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
