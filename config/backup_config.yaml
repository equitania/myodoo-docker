# Odoo Database Backup Configuration
# Version: 1.0.0
# Date: 2025-01-08

# Global settings for all backups
global:
  backup_root: /opt/backups
  min_disk_space_gb: 5.0
  max_retry_attempts: 3
  retry_delay_seconds: 5
  log_level: INFO
  default_retention_days: 14
  compression:
    type: zstd  # Using zstd for all backups
    level: 10
  logging:
    max_size_mb: 10
    backup_count: 5
  # Credentials configuration
  credentials:
    config_file: /etc/myodoo/backup_credentials.yaml  # Primary location
    fallback_locations:
      - ~/.myodoo/backup_credentials.yaml
      - config/backup_credentials.yaml
    key_directory: /etc/myodoo/keys  # Directory for encryption key files

# Database backup configurations
databases:
  - name: live_db  # Database name
    user: ownerp  # Database user
    containers:
      database: live-db  # PostgreSQL container name
      odoo: live-odoo  # Odoo container name
    retention_days: 5  # How many days to keep backups
    encryption:
      enabled: true  # Enable encryption for this database
    schedule:
      enabled: true
      cron: "0 2 * * *"  # Runs at 2 AM daily

  - name: test_db
    user: ownerp
    containers:
      database: test-db
      odoo: test-odoo
    retention_days: 5
    encryption:
      enabled: true
    schedule:
      enabled: true
      cron: "0 3 * * *"  # Runs at 3 AM daily

# Additional backup paths
additional_backups:
  nginx:
    enabled: true
    source_path: /etc/nginx/
    retention_days: 14
    encryption:
      enabled: true
    compression:
      type: zstd
      level: 10
    schedule:
      cron: "0 4 * * *"  # Runs at 4 AM daily

  letsencrypt:
    enabled: true
    source_path: /etc/letsencrypt/live/
    retention_days: 14
    encryption:
      enabled: true
    compression:
      type: zstd
      level: 10
    schedule:
      cron: "0 4 * * *"  # Runs at 4 AM daily

  docker_builds:
    enabled: true
    source_path: /root/docker-builds
    retention_days: 14
    encryption:
      enabled: true
    compression:
      type: zstd
      level: 10
    schedule:
      cron: "0 4 * * *"  # Runs at 4 AM daily

  fast_report:
    enabled: true
    source_path: /opt/fast-report
    retention_days: 14
    encryption:
      enabled: true
    compression:
      type: zstd
      level: 10
    schedule:
      cron: "0 4 * * *"  # Runs at 4 AM daily
