# Docker Compose for Odoo 14
# 20.01.2026
#
# SECURITY WARNING: This is a TEMPLATE file!
# Replace all placeholder passwords before production use!
version: '3.9'

volumes:
  vol-pg-live:
      name: vol-pg-live
  vol-odoo-live:
      name: vol-odoo-live

services:
    live-db:
        image: postgres:12.7-alpine
        environment:
          - POSTGRES_USER=ownerp
          - POSTGRES_PASSWORD=CHANGE_ME_BEFORE_PRODUCTION  # WARNING: Replace with secure password!
          - POSTGRES_DB=postgres
        networks:
          - ownerp-net
        volumes:
          - vol-pg-live:/var/lib/postgresql/data/
        restart: always
        container_name: live-db
    live-myodoo:
        image: myodoo/myodoo-14-public:latest
        ports:
          - 8069:8069
          - 8072:8072
        networks:
          - ownerp-net
        volumes:
          - vol-odoo-live:/opt/odoo/data
        restart: always
        container_name: live-myodoo
        command: start
networks:
    ownerp-net:
        driver: bridge
        name: ownerp-net