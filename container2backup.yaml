defaults:
  backup_path: "/opt/backups"  # Hauptbackup-Verzeichnis
  retention_days: 14
  db_user: "ownerp"
  compression:
    level: 5

services:
  docker_builds:
    enabled: true
    source_path: "~/docker-builds"  # oder "$HOME/docker-builds"
    backup_path: docker-builds
    retention_days: 14 